<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snail Betting</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --red: #e74c3c;
  --blue: #3498db;
  --green: #2ecc71;
  --yellow: #f1c40f;
  --purple: #9b59b6;
  --orange: #e67e22;
  --bg: #1a1a2e;
  --panel: #16213e;
  --text: #eee;
  --accent: #0f3460;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}

#setup-screen, #game-screen, #gameover-screen, #race-results-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  padding: 20px;
  max-width: 500px;
  margin: 0 auto;
}
#setup-screen.active, #game-screen.active, #gameover-screen.active, #race-results-screen.active {
  display: flex;
}

h1 { font-size: 1.6rem; margin-bottom: 10px; }

.setup-section {
  background: var(--panel);
  border-radius: 12px;
  padding: 20px;
  width: 100%;
  margin-bottom: 16px;
}
.setup-section label { display: block; margin-bottom: 8px; font-weight: 600; }

.player-count-btns {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
}
.player-count-btns button {
  flex: 1;
  padding: 12px;
  font-size: 1.1rem;
  border: 2px solid var(--accent);
  background: var(--bg);
  color: var(--text);
  border-radius: 8px;
  cursor: pointer;
  min-height: 44px;
}
.player-count-btns button.selected {
  background: var(--accent);
  border-color: #3a86ff;
}

.name-inputs { display: flex; flex-direction: column; gap: 8px; }
.name-inputs input {
  padding: 10px 14px;
  font-size: 1rem;
  border: 1px solid #333;
  border-radius: 8px;
  background: var(--bg);
  color: var(--text);
  min-height: 44px;
}

.btn-primary {
  width: 100%;
  padding: 14px;
  font-size: 1.1rem;
  font-weight: 700;
  border: none;
  border-radius: 10px;
  background: #3a86ff;
  color: #fff;
  cursor: pointer;
  min-height: 48px;
  margin-top: 8px;
}
.btn-primary:active { background: #2563eb; }

#game-screen { padding: 10px; max-width: 600px; }

.game-header {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 12px;
  background: var(--panel);
  border-radius: 10px;
  margin-bottom: 8px;
  flex-wrap: wrap;
  gap: 4px;
}
.game-header .title { font-weight: 700; font-size: 1rem; }
.game-header .info { font-size: 0.85rem; opacity: 0.85; }

.track-container {
  width: 100%;
  background: var(--panel);
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 8px;
  overflow-x: auto;
}

.track {
  display: grid;
  grid-template-columns: 30px repeat(10, 1fr) 30px;
  grid-template-rows: repeat(6, 36px);
  gap: 2px;
  min-width: 320px;
}

.lane-label {
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.75rem;
  border-radius: 4px;
}

.track-cell {
  background: rgba(255,255,255,0.04);
  border-radius: 3px;
  position: relative;
}

.finish-cell {
  background: rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.6rem;
  font-weight: 700;
  color: rgba(255,255,255,0.4);
}

.snail {
  position: absolute;
  inset: 2px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 2;
}

.dice-display {
  width: 100%;
  background: var(--panel);
  border-radius: 10px;
  padding: 10px 14px;
  margin-bottom: 8px;
  text-align: center;
  min-height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  font-size: 0.95rem;
}

.die {
  width: 40px;
  height: 40px;
  border-radius: 8px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  font-weight: 700;
  color: #fff;
  text-shadow: 0 1px 2px rgba(0,0,0,0.5);
}

.die.rolling {
  animation: diceRoll 0.1s infinite;
}

@keyframes diceRoll {
  0% { transform: rotate(0deg) scale(1); }
  25% { transform: rotate(10deg) scale(1.05); }
  50% { transform: rotate(-5deg) scale(0.95); }
  75% { transform: rotate(8deg) scale(1.02); }
  100% { transform: rotate(0deg) scale(1); }
}

.betting-panel {
  width: 100%;
  background: var(--panel);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 8px;
}

.multiplier-badge {
  text-align: center;
  font-size: 1.1rem;
  font-weight: 700;
  color: #f1c40f;
  margin-bottom: 8px;
}

.snail-picker {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin-bottom: 10px;
  flex-wrap: wrap;
}

.snail-pick-btn {
  width: 48px;
  height: 44px;
  border: 3px solid transparent;
  border-radius: 10px;
  cursor: pointer;
  font-size: 1.1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-weight: 700;
}
.snail-pick-btn.selected {
  border-color: #fff;
  box-shadow: 0 0 10px rgba(255,255,255,0.4);
}

.wager-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 12px;
}

.wager-btn {
  width: 44px;
  height: 44px;
  border-radius: 8px;
  border: 1px solid #555;
  background: var(--bg);
  color: var(--text);
  font-size: 1.3rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.wager-amount {
  font-size: 1.3rem;
  font-weight: 700;
  min-width: 60px;
  text-align: center;
}

.action-btns {
  display: flex;
  gap: 8px;
}
.action-btns button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 10px;
  font-size: 0.95rem;
  font-weight: 700;
  cursor: pointer;
  min-height: 48px;
}

.btn-bet { background: #2ecc71; color: #fff; }
.btn-bet:disabled { background: #555; opacity: 0.6; }
.btn-skip { background: #555; color: #fff; }

.info-panel {
  width: 100%;
  background: var(--panel);
  border-radius: 10px;
  padding: 10px 12px;
  margin-bottom: 8px;
  font-size: 0.85rem;
}
.info-panel .section-label {
  font-weight: 700;
  margin-bottom: 4px;
  font-size: 0.8rem;
  opacity: 0.7;
  text-transform: uppercase;
}
.bets-list { margin-bottom: 8px; }
.bet-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 6px;
  margin: 2px;
  font-size: 0.8rem;
  font-weight: 600;
  color: #fff;
}
.bet-odds {
  opacity: 0.85;
  font-size: 0.75rem;
  font-weight: 400;
}
.standings-row {
  display: flex;
  justify-content: space-between;
  padding: 2px 0;
}
.standings-row.current { font-weight: 700; }

#gameover-screen {
  text-align: center;
  padding-top: 40px;
}
.podium { width: 100%; margin: 20px 0; }
.podium-entry {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  background: var(--panel);
  border-radius: 10px;
  margin-bottom: 8px;
  font-size: 1.05rem;
}
.podium-entry:first-child {
  background: linear-gradient(135deg, #f1c40f33, #f39c1233);
  border: 1px solid #f1c40f;
}
.podium-rank { font-weight: 700; margin-right: 10px; }
.podium-coins { font-weight: 700; color: #f1c40f; }

.winner-snail {
  font-size: 1rem;
  margin: 10px 0;
  padding: 10px 16px;
  background: var(--panel);
  border-radius: 10px;
}

.high-score-msg {
  color: #f1c40f;
  font-weight: 700;
  margin-top: 10px;
  font-size: 1.05rem;
}

.action-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
}
.action-tabs button {
  flex: 1;
  padding: 8px;
  border: 2px solid var(--accent);
  background: var(--bg);
  color: var(--text);
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.85rem;
  font-weight: 600;
  min-height: 44px;
}
.action-tabs button.active {
  background: var(--accent);
  border-color: #3a86ff;
}

.share-count {
  display: block;
  font-size: 0.6rem;
  opacity: 0.8;
  margin-top: 1px;
}

.snail-pick-btn:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}

.btn-share { background: #3498db; color: #fff; }
.btn-share:disabled { background: #555; opacity: 0.6; }
.btn-drug { background: #e74c3c; color: #fff; }
.btn-drug:disabled { background: #555; opacity: 0.6; }

.negative-coins { color: #e74c3c; }

.share-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 6px;
  margin: 2px;
  font-size: 0.8rem;
  font-weight: 600;
  color: #fff;
}

.manager-label {
  font-size: 0.65rem;
  opacity: 0.7;
  font-weight: 400;
}

#race-results-screen { padding-top: 30px; }

.race-result-section {
  width: 100%;
  background: var(--panel);
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 10px;
}
.race-result-section h3 {
  font-size: 0.9rem;
  margin-bottom: 8px;
  opacity: 0.7;
  text-transform: uppercase;
}

.result-row {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
}

.debt-warning {
  color: #e74c3c;
  font-weight: 600;
}
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup-screen" class="active">
  <h1>Snail Betting</h1>
  <div class="setup-section">
    <label>Number of Players</label>
    <div class="player-count-btns" id="player-count-btns">
      <button data-count="1">1</button>
      <button data-count="2" class="selected">2</button>
      <button data-count="3">3</button>
      <button data-count="4">4</button>
    </div>
    <label>Player Names</label>
    <div class="name-inputs" id="name-inputs">
      <input type="text" placeholder="Player 1" maxlength="12">
      <input type="text" placeholder="Player 2" maxlength="12">
    </div>
  </div>
  <button class="btn-primary" id="start-btn">Start Race!</button>
</div>

<!-- GAME SCREEN -->
<div id="game-screen">
  <div class="game-header">
    <span class="title">Snail Betting</span>
    <span class="info" id="round-info">Round: 1</span>
    <span class="info" id="player-info">Player: — (100 coins)</span>
  </div>

  <div class="track-container">
    <div class="track" id="track"></div>
  </div>

  <div class="dice-display" id="dice-display">
    <span style="opacity:0.5">Roll dice to start!</span>
  </div>

  <div class="betting-panel" id="betting-panel">
    <div class="action-tabs" id="action-tabs">
      <button class="active" data-tab="bet">Place Bet</button>
      <button data-tab="share">Buy Share</button>
      <button data-tab="drug" style="display:none">Give Drugs</button>
    </div>
    <div id="bet-tab">
      <div class="multiplier-badge" id="multiplier-badge">BET — 5x payout!</div>
      <div class="snail-picker" id="snail-picker"></div>
      <div class="wager-row">
        <button class="wager-btn" id="wager-down">&minus;</button>
        <span class="wager-amount" id="wager-amount">10</span>
        <button class="wager-btn" id="wager-up">+</button>
      </div>
    </div>
    <div id="share-tab" style="display:none">
      <div class="multiplier-badge">Buy a share — $10 each</div>
      <div class="snail-picker" id="share-picker"></div>
    </div>
    <div id="drug-tab" style="display:none">
      <div class="multiplier-badge" style="color:#e74c3c">Drug a snail — $5, doubles next roll!</div>
      <div class="snail-picker" id="drug-picker"></div>
    </div>
    <div class="action-btns">
      <button class="btn-bet" id="btn-bet">Place Bet</button>
      <button class="btn-share" id="btn-share" style="display:none">Buy Share ($10)</button>
      <button class="btn-drug" id="btn-drug" style="display:none">Give Drugs ($5)</button>
      <button class="btn-skip" id="btn-skip">Skip &amp; Roll</button>
    </div>
  </div>

  <div class="info-panel" id="info-panel">
    <div class="section-label">Your Bets</div>
    <div class="bets-list" id="bets-list">None yet</div>
    <div class="section-label">Your Shares</div>
    <div class="bets-list" id="shares-list">None yet</div>
    <div class="section-label">Standings</div>
    <div id="standings"></div>
  </div>
</div>

<!-- RACE RESULTS SCREEN -->
<div id="race-results-screen">
  <h1 id="race-results-title">Race 1 Complete!</h1>
  <div id="race-finish-order" class="race-result-section"></div>
  <div id="race-payouts" class="race-result-section"></div>
  <div id="race-massage-section" class="race-result-section"></div>
  <div id="race-standings" class="race-result-section"></div>
  <button class="btn-primary" id="next-race-btn">Next Race</button>
</div>

<!-- GAME OVER SCREEN -->
<div id="gameover-screen">
  <h1>Game Over!</h1>
  <div class="winner-snail" id="winner-snail"></div>
  <div class="podium" id="podium"></div>
  <div class="high-score-msg" id="high-score-msg"></div>
  <button class="btn-primary" id="play-again-btn">Play Again</button>
</div>

<script>
// ═══════════════════════════════════
//  SNAIL BETTING — GAME ENGINE
// ═══════════════════════════════════

const SNAILS = [
  { color: 'red',    label: 'R', css: '#e74c3c' },
  { color: 'blue',   label: 'B', css: '#3498db' },
  { color: 'green',  label: 'G', css: '#2ecc71' },
  { color: 'yellow', label: 'Y', css: '#f1c40f' },
  { color: 'purple', label: 'P', css: '#9b59b6' },
  { color: 'orange', label: 'O', css: '#e67e22' },
];

const TRACK_LENGTH = 10;
const STARTING_COINS = 100;
const MIN_WAGER = 10;
const WAGER_STEP = 10;
const SHARE_COST = 10;
const MAX_SHARES_PER_SNAIL = 5;
const TOTAL_RACES = 3;
const DEBT_FLOOR = -100;
const DRUG_COST = 5;
const DRUG_SHOP_PAYOUT = 5;
const MASSAGE_COST = 5;
const MASSAGE_STRESS_RELIEF = 2;
const MASSAGE_SHOP_PAYOUT = 10;
const STRESS_MAX = 10;
const SHARE_PAYOUTS = { 1: 30, 2: 20, 3: 10 };

// Shops that players can own shares in (between-race purchasing is future work).
const SHOPS = ['drugShop', 'massageParlor'];

function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.textContent;
}

let state = null;
let selectedSnail = null;
let wager = MIN_WAGER;
let animating = false;
let activeTab = 'bet'; // 'bet', 'share', or 'drug'

// ── State management ──

function initGame(playerNames) {
  state = {
    players: playerNames.map(function(name) {
      return { name: name, coins: STARTING_COINS, bets: [], shares: {}, shopShares: {} };
    }),
    snails: SNAILS.map(function(s) {
      return { color: s.color, label: s.label, css: s.css, position: 0, stress: 0 };
    }),
    snailShares: {},
    drugged: {},
    eliminated: {},
    currentPlayerIndex: 0,
    round: 1,
    raceNumber: 1,
    gameOver: false,
    lastRoll: null,
    turnPhase: 'bet',
    raceResults: [],
  };
  SNAILS.forEach(function(s) { state.snailShares[s.color] = 0; state.drugged[s.color] = false; state.eliminated[s.color] = false; });
  selectedSnail = null;
  wager = MIN_WAGER;
  activeTab = 'bet';
}

function resetForNextRace() {
  state.snails.forEach(function(s) {
    s.position = 0;
    // Eliminated snails get stress reset to 0; others keep their stress
    if (state.eliminated[s.color]) s.stress = 0;
  });
  state.players.forEach(function(p) {
    p.bets = [];
    p.shares = {};
  });
  SNAILS.forEach(function(s) { state.snailShares[s.color] = 0; state.drugged[s.color] = false; state.eliminated[s.color] = false; });
  state.raceNumber++;
  state.round = 1;
  state.currentPlayerIndex = 0;
  state.turnPhase = 'bet';
  state.lastRoll = null;
  selectedSnail = null;
  wager = MIN_WAGER;
  activeTab = 'bet';
}

function getLeadingPosition() {
  return Math.max.apply(null, state.snails.map(function(s) { return s.position; }));
}

function calculateMultiplier() {
  var lead = getLeadingPosition();
  if (lead <= 2) return 5;
  if (lead <= 5) return 3;
  if (lead <= 7) return 2;
  return 1.5;
}

function rollDice() {
  var d1 = Math.floor(Math.random() * 6);
  var d2 = Math.floor(Math.random() * 6);
  return [d1, d2];
}

function moveSnails(dieIndices) {
  var moves = {};
  dieIndices.forEach(function(idx) {
    moves[idx] = (moves[idx] || 0) + 1;
  });
  Object.keys(moves).forEach(function(idx) {
    var snail = state.snails[idx];
    if (state.eliminated[snail.color]) return; // eliminated snails don't move
    var spaces = moves[idx];
    if (state.drugged[snail.color]) spaces *= 2;
    snail.position = Math.min(snail.position + spaces, TRACK_LENGTH);
  });
  // Clear all drug effects after each roll
  SNAILS.forEach(function(s) { state.drugged[s.color] = false; });
}

// Returns sorted array of all snails by finish position (1st, 2nd, 3rd...)
// Eliminated snails always rank last.
function getRaceRanking() {
  var sorted = state.snails.slice().sort(function(a, b) {
    var aElim = state.eliminated[a.color] ? 1 : 0;
    var bElim = state.eliminated[b.color] ? 1 : 0;
    if (aElim !== bElim) return aElim - bElim;
    if (b.position !== a.position) return b.position - a.position;
    return SNAILS.findIndex(function(s) { return s.color === a.color; })
         - SNAILS.findIndex(function(s) { return s.color === b.color; });
  });
  return sorted;
}

function checkWin() {
  var finished = state.snails.filter(function(s) {
    return s.position >= TRACK_LENGTH && !state.eliminated[s.color];
  });
  if (finished.length === 0) return null;
  return getRaceRanking()[0];
}

function canAfford(player, cost) {
  return (player.coins - cost) >= DEBT_FLOOR;
}

function placeBet(playerIndex, snailColor, amount) {
  var player = state.players[playerIndex];
  if (amount < MIN_WAGER || !canAfford(player, amount)) return false;
  var multiplier = calculateMultiplier();
  player.coins -= amount;
  player.bets.push({ snailColor: snailColor, amount: amount, multiplier: multiplier });
  return true;
}

function buyShare(playerIndex, snailColor) {
  var player = state.players[playerIndex];
  if (!canAfford(player, SHARE_COST)) return false;
  var totalForSnail = state.snailShares[snailColor] || 0;
  if (totalForSnail >= MAX_SHARES_PER_SNAIL) return false;
  player.coins -= SHARE_COST;
  player.shares[snailColor] = (player.shares[snailColor] || 0) + 1;
  state.snailShares[snailColor] = totalForSnail + 1;
  return true;
}

// Drug a snail — only the manager (majority shareholder) can do this.
// Costs DRUG_COST credits. Doubles the snail's movement on the immediately
// following roll only (hit or miss), then the effect clears.
// Each drug shop shareholder receives DRUG_SHOP_PAYOUT credits per purchase.
function drugSnail(playerIndex, snailColor) {
  var player = state.players[playerIndex];
  var manager = getMajorityShareholder(snailColor);
  if (!manager || manager !== player) return false;
  if (state.drugged[snailColor]) return false;
  if (state.eliminated[snailColor]) return false;
  if (!canAfford(player, DRUG_COST)) return false;
  player.coins -= DRUG_COST;
  state.drugged[snailColor] = true;
  // Add stress from drug use
  var snail = state.snails.find(function(s) { return s.color === snailColor; });
  snail.stress++;
  if (snail.stress >= STRESS_MAX) {
    state.eliminated[snailColor] = true;
    state.drugged[snailColor] = false;
  }
  // Pay drug shop shareholders
  state.players.forEach(function(p) {
    var shares = p.shopShares['drugShop'] || 0;
    if (shares > 0) {
      p.coins += DRUG_SHOP_PAYOUT * shares;
    }
  });
  return true;
}

// Massage a snail — between-race manager action.
// Costs MASSAGE_COST credits. Removes MASSAGE_STRESS_RELIEF stress (min 0).
// Each massage parlor shareholder receives MASSAGE_SHOP_PAYOUT credits per share.
function massageSnail(playerIndex, snailColor) {
  var player = state.players[playerIndex];
  var manager = getMajorityShareholder(snailColor);
  if (!manager || manager !== player) return false;
  if (!canAfford(player, MASSAGE_COST)) return false;
  var snail = state.snails.find(function(s) { return s.color === snailColor; });
  if (snail.stress <= 0) return false;
  player.coins -= MASSAGE_COST;
  snail.stress = Math.max(0, snail.stress - MASSAGE_STRESS_RELIEF);
  // Pay massage parlor shareholders
  state.players.forEach(function(p) {
    var shares = p.shopShares['massageParlor'] || 0;
    if (shares > 0) {
      p.coins += MASSAGE_SHOP_PAYOUT * shares;
    }
  });
  return true;
}

function getMajorityShareholder(snailColor) {
  var maxShares = 0;
  var manager = null;
  var tied = false;
  state.players.forEach(function(p) {
    var count = p.shares[snailColor] || 0;
    if (count > maxShares) {
      maxShares = count;
      manager = p;
      tied = false;
    } else if (count === maxShares && count > 0) {
      tied = true;
    }
  });
  if (maxShares === 0 || tied) return null;
  return manager;
}

function resolveBets(winningColor) {
  state.players.forEach(function(player) {
    player.bets.forEach(function(bet) {
      if (bet.snailColor === winningColor) {
        player.coins += Math.floor(bet.amount * bet.multiplier);
      }
    });
  });
}

function resolveShares(ranking) {
  // ranking is sorted array: [1st snail, 2nd snail, 3rd snail, ...]
  var payoutLog = [];
  for (var place = 1; place <= 3; place++) {
    var snailColor = ranking[place - 1].color;
    var payout = SHARE_PAYOUTS[place];
    state.players.forEach(function(player) {
      var count = player.shares[snailColor] || 0;
      if (count > 0) {
        var total = count * payout;
        player.coins += total;
        payoutLog.push({ playerName: player.name, snailColor: snailColor, count: count, payout: payout, total: total, place: place });
      }
    });
  }
  return payoutLog;
}

// Adjust stress after a race: top 3 get -1, bottom 3 get +1 (skip eliminated).
function adjustRaceStress(ranking) {
  ranking.forEach(function(s, i) {
    if (state.eliminated[s.color]) return; // already handled
    if (i < 3) {
      s.stress = Math.max(0, s.stress - 1);
    } else {
      s.stress++;
    }
  });
}

function serviceDebt() {
  var debtLog = [];
  state.players.forEach(function(player) {
    if (player.coins < 0) {
      var fee = Math.ceil(Math.abs(player.coins) / 2);
      player.coins -= fee;
      debtLog.push({ playerName: player.name, fee: fee, newBalance: player.coins });
    }
  });
  return debtLog;
}

// ── Monte Carlo win probability simulation ──

var SIM_RUNS = 1000;

function simulateWinProbabilities() {
  var positions = state.snails.map(function(s) { return s.position; });
  var elim = state.snails.map(function(s) { return state.eliminated[s.color]; });
  var wins = [0, 0, 0, 0, 0, 0];

  for (var r = 0; r < SIM_RUNS; r++) {
    var simPos = positions.slice();
    var maxIter = 100;
    while (maxIter-- > 0) {
      var d1 = Math.floor(Math.random() * 6);
      var d2 = Math.floor(Math.random() * 6);
      if (!elim[d1]) simPos[d1] = Math.min(simPos[d1] + 1, TRACK_LENGTH);
      if (!elim[d2]) simPos[d2] = Math.min(simPos[d2] + 1, TRACK_LENGTH);

      var best = -1;
      var bestPos = -1;
      for (var i = 0; i < 6; i++) {
        if (!elim[i] && simPos[i] >= TRACK_LENGTH && simPos[i] > bestPos) {
          bestPos = simPos[i];
          best = i;
        } else if (!elim[i] && simPos[i] >= TRACK_LENGTH && simPos[i] === bestPos && (best === -1 || i < best)) {
          best = i;
        }
      }
      if (best !== -1) {
        wins[best]++;
        break;
      }
    }
  }

  var probs = {};
  for (var j = 0; j < 6; j++) {
    probs[SNAILS[j].color] = Math.round((wins[j] / SIM_RUNS) * 100);
  }
  return probs;
}

function nextTurn() {
  state.currentPlayerIndex = (state.currentPlayerIndex + 1) % state.players.length;
  if (state.currentPlayerIndex === 0) state.round++;
  state.turnPhase = 'bet';
  selectedSnail = null;
  wager = MIN_WAGER;
  activeTab = 'bet';
}

// ── Rendering ──

function showScreen(id) {
  ['setup-screen', 'game-screen', 'gameover-screen', 'race-results-screen'].forEach(function(sid) {
    document.getElementById(sid).classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}

function buildTrack() {
  var track = document.getElementById('track');
  track.textContent = '';
  for (var row = 0; row < 6; row++) {
    var label = document.createElement('div');
    label.className = 'lane-label';
    label.style.background = SNAILS[row].css;
    var snail = state.snails[row];
    if (state.eliminated[snail.color]) {
      label.textContent = 'X';
      label.style.opacity = '0.4';
    } else {
      label.textContent = SNAILS[row].label;
      if (snail.stress > 0) {
        label.title = capitalize(snail.color) + ' stress: ' + snail.stress + '/' + STRESS_MAX;
      }
    }
    track.appendChild(label);

    for (var col = 0; col < TRACK_LENGTH; col++) {
      var cell = document.createElement('div');
      cell.className = 'track-cell';
      cell.dataset.row = row;
      cell.dataset.col = col;
      track.appendChild(cell);
    }

    var finish = document.createElement('div');
    finish.className = 'finish-cell';
    finish.textContent = '\u{1F3C1}';
    track.appendChild(finish);
  }
}

function renderSnails() {
  document.querySelectorAll('.snail').forEach(function(el) { el.remove(); });

  for (var i = 0; i < 6; i++) {
    var snail = state.snails[i];
    var isElim = state.eliminated[snail.color];
    var pos = snail.position;
    var cell;

    if (pos >= TRACK_LENGTH) {
      cell = document.querySelectorAll('.finish-cell')[i];
    } else {
      cell = document.querySelector('.track-cell[data-row="' + i + '"][data-col="' + pos + '"]');
    }
    if (!cell) continue;

    var el = document.createElement('div');
    el.className = 'snail';
    el.style.background = snail.css;
    if (isElim) {
      el.textContent = '\u274C';
      el.style.opacity = '0.3';
      el.style.filter = 'grayscale(1)';
    } else {
      el.textContent = '\u{1F40C}';
    }
    cell.appendChild(el);
  }
}

function renderHeader() {
  var p = state.players[state.currentPlayerIndex];
  document.getElementById('round-info').textContent = 'Race ' + state.raceNumber + '/' + TOTAL_RACES + ' | Turn ' + state.round;
  var coinText = p.coins + ' coins';

  }
}

function renderMultiplier() {
  var m = calculateMultiplier();
  document.getElementById('multiplier-badge').textContent = 'BET \u2014 ' + m + 'x payout!';
}

function renderBettingPanel() {
  var panel = document.getElementById('betting-panel');
  var player = state.players[state.currentPlayerIndex];

  if (state.turnPhase === 'bet') {
    panel.style.display = '';

    // Tab state
    var betTab = document.getElementById('bet-tab');
    var shareTab = document.getElementById('share-tab');
    var drugTab = document.getElementById('drug-tab');
    var btnBet = document.getElementById('btn-bet');
    var btnShare = document.getElementById('btn-share');
    var btnDrug = document.getElementById('btn-drug');

    // Show/hide the drug tab button based on whether the player manages any snail
    var drugTabBtn = document.querySelector('#action-tabs button[data-tab="drug"]');
    var managedSnails = getManagedSnails(player);
    if (drugTabBtn) {
      drugTabBtn.style.display = managedSnails.length > 0 ? '' : 'none';
    }
    // If player lost manager status while on drug tab, switch back to bet
    if (activeTab === 'drug' && managedSnails.length === 0) activeTab = 'bet';

    document.querySelectorAll('#action-tabs button').forEach(function(b) {
      b.classList.toggle('active', b.dataset.tab === activeTab);
    });

    betTab.style.display = 'none';
    shareTab.style.display = 'none';
    drugTab.style.display = 'none';
    btnBet.style.display = 'none';
    btnShare.style.display = 'none';
    btnDrug.style.display = 'none';

    if (activeTab === 'bet') {
      betTab.style.display = '';
      btnBet.style.display = '';
      renderMultiplier();
      renderSnailPicker();
      document.getElementById('wager-amount').textContent = wager;
      btnBet.disabled = !selectedSnail || !canAfford(player, wager) || wager < MIN_WAGER;
    } else if (activeTab === 'share') {
      shareTab.style.display = '';
      btnShare.style.display = '';
      renderSharePicker();
      btnShare.disabled = !selectedSnail || !canAfford(player, SHARE_COST)
        || (state.snailShares[selectedSnail] || 0) >= MAX_SHARES_PER_SNAIL;
    } else if (activeTab === 'drug') {
      drugTab.style.display = '';
      btnDrug.style.display = '';
      renderDrugPicker();
      btnDrug.disabled = !selectedSnail || state.drugged[selectedSnail] || state.eliminated[selectedSnail] || !canAfford(player, DRUG_COST);
    }
  } else {
    panel.style.display = 'none';
  }
}

function renderSnailPicker() {
  var picker = document.getElementById('snail-picker');
  picker.textContent = '';
  SNAILS.forEach(function(s) {
    var isElim = state.eliminated[s.color];
    var btn = document.createElement('button');
    btn.className = 'snail-pick-btn' + (selectedSnail === s.color ? ' selected' : '');
    btn.style.background = s.css;
    if (isElim) {
      btn.textContent = '\u274C';
      btn.disabled = true;
      btn.style.opacity = '0.3';
    } else {
      btn.textContent = '\u{1F40C}';
    }
    btn.addEventListener('click', function() {
      if (!isElim) {
        selectedSnail = s.color;
        renderBettingPanel();
      }
    });
    picker.appendChild(btn);
  });
}

function renderSharePicker() {
  var picker = document.getElementById('share-picker');
  picker.textContent = '';
  SNAILS.forEach(function(s) {
    var totalSold = state.snailShares[s.color] || 0;
    var isElim = state.eliminated[s.color];
    var btn = document.createElement('button');
    btn.className = 'snail-pick-btn' + (selectedSnail === s.color ? ' selected' : '');
    btn.style.background = s.css;
    btn.disabled = totalSold >= MAX_SHARES_PER_SNAIL || isElim;
    if (isElim) btn.style.opacity = '0.3';

    var emoji = document.createElement('span');
    emoji.textContent = isElim ? '\u274C' : '\u{1F40C}';
    btn.appendChild(emoji);

    var count = document.createElement('span');
    count.className = 'share-count';
    count.textContent = isElim ? 'OUT' : totalSold + '/' + MAX_SHARES_PER_SNAIL;
    btn.appendChild(count);

    btn.addEventListener('click', function() {
      if (totalSold < MAX_SHARES_PER_SNAIL && !isElim) {
        selectedSnail = s.color;
        renderBettingPanel();
      }
    });
    picker.appendChild(btn);
  });
}

// Returns list of snail colors the player is majority shareholder of
function getManagedSnails(player) {
  var managed = [];
  SNAILS.forEach(function(s) {
    var mgr = getMajorityShareholder(s.color);
    if (mgr === player) managed.push(s.color);
  });
  return managed;
}

function renderDrugPicker() {
  var picker = document.getElementById('drug-picker');
  picker.textContent = '';
  var player = state.players[state.currentPlayerIndex];
  var managed = getManagedSnails(player);
  SNAILS.forEach(function(s) {
    var isManaged = managed.indexOf(s.color) !== -1;
    var snail = state.snails.find(function(sn) { return sn.color === s.color; });
    var isElim = state.eliminated[s.color];
    var btn = document.createElement('button');
    btn.className = 'snail-pick-btn' + (selectedSnail === s.color ? ' selected' : '');
    btn.style.background = s.css;
    btn.disabled = !isManaged || state.drugged[s.color] || isElim;
    if (isElim) btn.style.opacity = '0.3';

    var emoji = document.createElement('span');
    emoji.textContent = isElim ? '\u274C' : '\u{1F40C}';
    btn.appendChild(emoji);

    if (isManaged) {
      var label = document.createElement('span');
      label.className = 'share-count';
      if (isElim) {
        label.textContent = 'OUT';
        label.style.color = '#e74c3c';
      } else if (state.drugged[s.color]) {
        label.textContent = 'high';
      } else {
        label.textContent = snail.stress + '/' + STRESS_MAX;
        if (snail.stress >= 7) label.style.color = '#e74c3c';
      }
      btn.appendChild(label);
    }

    btn.addEventListener('click', function() {
      if (isManaged && !state.drugged[s.color] && !isElim) {
        selectedSnail = s.color;
        renderBettingPanel();
      }
    });
    picker.appendChild(btn);
  });
}

function renderInfoPanel() {
  var player = state.players[state.currentPlayerIndex];

  // Bets
  var betsList = document.getElementById('bets-list');
  betsList.textContent = '';
  if (player.bets.length === 0) {
    betsList.textContent = 'None yet';
  } else {
    var probs = simulateWinProbabilities();
    player.bets.forEach(function(b) {
      var s = SNAILS.find(function(sn) { return sn.color === b.snailColor; });
      var tag = document.createElement('span');
      tag.className = 'bet-tag';
      tag.style.background = s.css;
      tag.appendChild(document.createTextNode(s.label + ' ' + b.amount + '@' + b.multiplier + 'x'));
      var oddsSpan = document.createElement('span');
      oddsSpan.className = 'bet-odds';
      oddsSpan.textContent = '(' + probs[b.snailColor] + '%)';
      tag.appendChild(oddsSpan);
      betsList.appendChild(tag);
    });
  }

  // Shares
  var sharesList = document.getElementById('shares-list');
  sharesList.textContent = '';
  var hasShares = false;
  SNAILS.forEach(function(s) {
    var count = player.shares[s.color] || 0;
    if (count > 0) {
      hasShares = true;
      var tag = document.createElement('span');
      tag.className = 'share-tag';
      tag.style.background = s.css;
      tag.textContent = s.label + ' x' + count;
      var mgr = getMajorityShareholder(s.color);
      if (mgr === player) {
        var mgrLabel = document.createElement('span');
        mgrLabel.className = 'manager-label';
        mgrLabel.textContent = ' (mgr)';
        tag.appendChild(mgrLabel);
      }
      sharesList.appendChild(tag);
    }
  });
  if (!hasShares) sharesList.textContent = 'None yet';

  // Standings
  var standings = document.getElementById('standings');
  standings.textContent = '';
  state.players.forEach(function(p, i) {
    var row = document.createElement('div');
    row.className = 'standings-row' + (i === state.currentPlayerIndex ? ' current' : '');

    var nameSpan = document.createElement('span');
    nameSpan.textContent = escapeHTML(p.name);
    row.appendChild(nameSpan);

    var coinsSpan = document.createElement('span');
    coinsSpan.textContent = p.coins + ' coins';
    if (p.coins < 0) coinsSpan.classList.add('negative-coins');
    row.appendChild(coinsSpan);

    standings.appendChild(row);
  });
}

function renderDice(dieIndices) {
  var display = document.getElementById('dice-display');
  display.textContent = '';

  if (!dieIndices) {
    var hint = document.createElement('span');
    hint.style.opacity = '0.5';
    hint.textContent = 'Roll dice to start!';
    display.appendChild(hint);
    return;
  }

  dieIndices.forEach(function(idx, i) {
    if (i > 0) {
      var plus = document.createElement('span');
      plus.textContent = '+';
      display.appendChild(plus);
    }
    var die = document.createElement('div');
    die.className = 'die';
    die.style.background = SNAILS[idx].css;
    die.textContent = SNAILS[idx].label;
    display.appendChild(die);
  });

  if (dieIndices[0] === dieIndices[1]) {
    var dbl = document.createElement('span');
    dbl.style.color = '#f1c40f';
    dbl.style.fontWeight = '700';
    dbl.textContent = ' Double!';
    display.appendChild(dbl);
  }
}

function renderAll() {
  renderHeader();
  renderSnails();
  renderBettingPanel();
  renderInfoPanel();
}

// ── Dice animation ──

function animateDiceRoll(callback) {
  animating = true;
  var display = document.getElementById('dice-display');
  var ticks = 0;
  var maxTicks = 12;

  var interval = setInterval(function() {
    var r1 = Math.floor(Math.random() * 6);
    var r2 = Math.floor(Math.random() * 6);

    display.textContent = '';
    [r1, r2].forEach(function(idx, i) {
      if (i > 0) {
        var plus = document.createElement('span');
        plus.textContent = '+';
        display.appendChild(plus);
      }
      var die = document.createElement('div');
      die.className = 'die rolling';
      die.style.background = SNAILS[idx].css;
      die.textContent = SNAILS[idx].label;
      display.appendChild(die);
    });

    ticks++;
    if (ticks >= maxTicks) {
      clearInterval(interval);
      animating = false;
      callback();
    }
  }, 80);
}

// ── Actions ──

function doPlaceBet() {
  if (animating || !selectedSnail) return;
  var ok = placeBet(state.currentPlayerIndex, selectedSnail, wager);
  if (!ok) return;
  state.turnPhase = 'rolling';
  renderAll();
  doRoll();
}

function doBuyShare() {
  if (animating || !selectedSnail) return;
  var ok = buyShare(state.currentPlayerIndex, selectedSnail);
  if (!ok) return;
  state.turnPhase = 'rolling';
  renderAll();
  doRoll();
}

function doDrugSnail() {
  if (animating || !selectedSnail) return;
  var ok = drugSnail(state.currentPlayerIndex, selectedSnail);
  if (!ok) return;
  state.turnPhase = 'rolling';
  renderAll();
  doRoll();
}

function doSkipAndRoll() {
  if (animating) return;
  state.turnPhase = 'rolling';
  renderBettingPanel();
  doRoll();
}

function doRoll() {
  var dice = rollDice();
  animateDiceRoll(function() {
    renderDice(dice);
    moveSnails(dice);
    state.lastRoll = dice;
    renderSnails();

    setTimeout(function() {
      var winner = checkWin();
      if (winner) {
        var ranking = getRaceRanking();
        resolveBets(winner.color);
        var shareLog = resolveShares(ranking);
        adjustRaceStress(ranking);
        var debtLog = serviceDebt();

        state.raceResults.push({
          raceNumber: state.raceNumber,
          ranking: ranking.map(function(s) { return { color: s.color, position: s.position }; }),
          shareLog: shareLog,
          debtLog: debtLog,
        });

        if (state.raceNumber < TOTAL_RACES) {
          showRaceResults(ranking, shareLog, debtLog);
        } else {
          state.gameOver = true;
          showGameOver(ranking);
        }
      } else {
        nextTurn();
        renderAll();
      }
    }, 600);
  });
}

// ── Race Results (between races) ──

function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

function showRaceResults(ranking, shareLog, debtLog) {
  showScreen('race-results-screen');

  document.getElementById('race-results-title').textContent = 'Race ' + state.raceNumber + ' Complete!';

  // Finish order
  var orderDiv = document.getElementById('race-finish-order');
  orderDiv.textContent = '';
  var h3 = document.createElement('h3');
  h3.textContent = 'Finish Order';
  orderDiv.appendChild(h3);

  var placeLabels = ['1st', '2nd', '3rd', '4th', '5th', '6th'];
  ranking.forEach(function(s, i) {
    var isElim = state.eliminated[s.color];
    var row = document.createElement('div');
    row.className = 'result-row';
    if (isElim) row.style.opacity = '0.4';
    var left = document.createElement('span');
    left.textContent = placeLabels[i] + ' ';
    var colorSpan = document.createElement('span');
    colorSpan.style.color = s.css;
    colorSpan.style.fontWeight = '700';
    colorSpan.textContent = capitalize(s.color) + (isElim ? ' (eliminated)' : '');
    left.appendChild(colorSpan);
    row.appendChild(left);
    var posSpan = document.createElement('span');
    posSpan.style.opacity = '0.6';
    posSpan.textContent = isElim ? 'stress KO' : 'pos ' + s.position;
    row.appendChild(posSpan);
    orderDiv.appendChild(row);
  });

  // Payouts
  var payoutsDiv = document.getElementById('race-payouts');
  payoutsDiv.textContent = '';
  var h3b = document.createElement('h3');
  h3b.textContent = 'Payouts';
  payoutsDiv.appendChild(h3b);

  if (shareLog.length === 0) {
    var noShares = document.createElement('div');
    noShares.textContent = 'No share payouts this race';
    noShares.style.opacity = '0.6';
    payoutsDiv.appendChild(noShares);
  } else {
    shareLog.forEach(function(entry) {
      var row = document.createElement('div');
      row.className = 'result-row';
      var left = document.createElement('span');
      left.textContent = escapeHTML(entry.playerName) + ': ' + entry.count + ' ' + capitalize(entry.snailColor) + ' share' + (entry.count > 1 ? 's' : '');
      row.appendChild(left);
      var right = document.createElement('span');
      right.style.color = '#2ecc71';
      right.style.fontWeight = '700';
      right.textContent = '+$' + entry.total;
      row.appendChild(right);
      payoutsDiv.appendChild(row);
    });

  if (debtLog.length > 0) {
    var debtH = document.createElement('h3');

      var row = document.createElement('div');
      row.className = 'result-row debt-warning';

    var row = document.createElement('div');

    row.style.alignItems = 'center';

    var left = document.createElement('span');
    left.style.display = 'flex';
    left.style.alignItems = 'center';
    left.style.gap = '8px';

    var colorDot = document.createElement('span');
    colorDot.style.display = 'inline-block';
    colorDot.style.width = '12px';
    colorDot.style.height = '12px';
    colorDot.style.borderRadius = '50%';
    colorDot.style.background = s.css;
    left.appendChild(colorDot);

    var nameText = document.createElement('span');
    nameText.textContent = capitalize(s.color);
    left.appendChild(nameText);

    // Stress bar
    var stressContainer = document.createElement('span');
    stressContainer.style.display = 'inline-flex';
    stressContainer.style.alignItems = 'center';
    stressContainer.style.gap = '4px';
    stressContainer.style.marginLeft = '6px';

    var stressLabel = document.createElement('span');
    stressLabel.style.fontSize = '0.75rem';
    stressLabel.style.opacity = '0.7';
    stressLabel.textContent = 'stress:';
    stressContainer.appendChild(stressLabel);

    var stressBar = document.createElement('span');
    stressBar.style.display = 'inline-block';
    stressBar.style.width = '50px';
    stressBar.style.height = '8px';
    stressBar.style.background = 'rgba(255,255,255,0.1)';
    stressBar.style.borderRadius = '4px';
    stressBar.style.overflow = 'hidden';

    var stressFill = document.createElement('span');
    stressFill.style.display = 'block';
    stressFill.style.height = '100%';
    stressFill.style.width = Math.min(100, (snail.stress / STRESS_MAX) * 100) + '%';
    stressFill.style.background = snail.stress >= 7 ? '#e74c3c' : snail.stress >= 4 ? '#f39c12' : '#2ecc71';
    stressFill.style.borderRadius = '4px';
    stressFill.style.transition = 'width 0.3s';
    stressBar.appendChild(stressFill);
    stressContainer.appendChild(stressBar);

    var stressNum = document.createElement('span');
    stressNum.style.fontSize = '0.75rem';
    stressNum.style.fontWeight = '700';
    stressNum.textContent = snail.stress + '/' + STRESS_MAX;
    if (snail.stress >= 7) stressNum.style.color = '#e74c3c';
    stressContainer.appendChild(stressNum);

    left.appendChild(stressContainer);
    row.appendChild(left);

    // Massage button — show for each player who manages this snail
    var manager = getMajorityShareholder(s.color);
    if (manager && snail.stress > 0) {
      var massBtn = document.createElement('button');
      massBtn.style.fontSize = '0.75rem';
      massBtn.style.padding = '4px 10px';
      massBtn.style.borderRadius = '6px';
      massBtn.style.border = 'none';
      massBtn.style.background = '#2ecc71';
      massBtn.style.color = '#fff';
      massBtn.style.cursor = 'pointer';
      massBtn.style.fontWeight = '600';
      massBtn.textContent = escapeHTML(manager.name) + ': Massage ($' + MASSAGE_COST + ')';
      var playerIdx = state.players.indexOf(manager);
      if (!canAfford(manager, MASSAGE_COST)) {
        massBtn.disabled = true;
        massBtn.style.opacity = '0.4';
        massBtn.style.cursor = 'default';
      }
      (function(pi, sc) {
        massBtn.addEventListener('click', function() {
          if (massageSnail(pi, sc)) {
            renderMassageSection();
            renderRaceStandings();
          }
        });
      })(playerIdx, s.color);
      row.appendChild(massBtn);
    }

    section.appendChild(row);
  });
}

// ── Game Over ──

function showGameOver(finalRanking) {
  showScreen('gameover-screen');

  var ws = document.getElementById('winner-snail');
  ws.textContent = '';

  // Show all race winners
  state.raceResults.forEach(function(result) {
    var winnerColor = result.ranking[0].color;
    var s = SNAILS.find(function(sn) { return sn.color === winnerColor; });
    var line = document.createElement('div');
    line.textContent = 'Race ' + result.raceNumber + ': ';
    var colorSpan = document.createElement('span');
    colorSpan.style.color = s.css;
    colorSpan.style.fontWeight = '700';
    colorSpan.textContent = capitalize(winnerColor) + ' \u{1F40C}';
    line.appendChild(colorSpan);
    ws.appendChild(line);
  });

  var sorted = state.players.slice().sort(function(a, b) { return b.coins - a.coins; });
  var podium = document.getElementById('podium');
  podium.textContent = '';

  var ranks = ['\u{1F947}', '\u{1F948}', '\u{1F949}'];
  sorted.forEach(function(p, i) {
    var entry = document.createElement('div');
    entry.className = 'podium-entry';
    if (i === 0) {
      entry.style.background = 'linear-gradient(135deg, #f1c40f33, #f39c1233)';
      entry.style.border = '1px solid #f1c40f';
    }

    var left = document.createElement('span');
    var rankSpan = document.createElement('span');
    rankSpan.className = 'podium-rank';
    rankSpan.textContent = i < 3 ? ranks[i] : '#' + (i + 1);
    left.appendChild(rankSpan);
    left.appendChild(document.createTextNode(' ' + escapeHTML(p.name)));
    entry.appendChild(left);

    var coins = document.createElement('span');
    coins.className = 'podium-coins';
    coins.textContent = p.coins + ' coins';
    if (p.coins < 0) coins.classList.add('negative-coins');
    entry.appendChild(coins);

    podium.appendChild(entry);
  });

  var hsMsg = document.getElementById('high-score-msg');
  hsMsg.textContent = '';
  if (state.players.length === 1) {
    var score = state.players[0].coins;
    var prev = localStorage.getItem('snailBettingHighScore');
    var highScore = prev ? parseInt(prev, 10) : 0;
    if (score > highScore) {
      localStorage.setItem('snailBettingHighScore', String(score));
      hsMsg.textContent = 'New High Score: ' + score + ' coins!';
    } else {
      hsMsg.textContent = 'Personal Best: ' + highScore + ' coins';
    }
  }
}

// ── Setup Screen Logic ──

var playerCount = 2;

document.querySelectorAll('#player-count-btns button').forEach(function(btn) {
  btn.addEventListener('click', function() {
    playerCount = parseInt(btn.dataset.count, 10);
    document.querySelectorAll('#player-count-btns button').forEach(function(b) {
      b.classList.remove('selected');
    });
    btn.classList.add('selected');
    updateNameInputs();
  });
});

function updateNameInputs() {
  var container = document.getElementById('name-inputs');
  container.textContent = '';
  for (var i = 0; i < playerCount; i++) {
    var input = document.createElement('input');
    input.type = 'text';
    input.placeholder = 'Player ' + (i + 1);
    input.maxLength = 12;
    container.appendChild(input);
  }
}

document.getElementById('start-btn').addEventListener('click', function() {
  var inputs = document.querySelectorAll('#name-inputs input');
  var names = Array.from(inputs).map(function(inp, i) {
    return inp.value.trim() || ('Player ' + (i + 1));
  });
  initGame(names);
  buildTrack();
  showScreen('game-screen');
  renderAll();
});

document.getElementById('play-again-btn').addEventListener('click', function() {
  showScreen('setup-screen');
});

document.getElementById('next-race-btn').addEventListener('click', function() {
  resetForNextRace();
  buildTrack();
  showScreen('game-screen');
  renderDice(null);
  renderAll();
});

// ── Tab switching ──

document.querySelectorAll('#action-tabs button').forEach(function(btn) {
  btn.addEventListener('click', function() {
    activeTab = btn.dataset.tab;
    selectedSnail = null;
    renderBettingPanel();
  });
});

// ── Wager controls ──

document.getElementById('wager-down').addEventListener('click', function() {
  if (wager > MIN_WAGER) {
    wager -= WAGER_STEP;
    renderBettingPanel();
  }
});

document.getElementById('wager-up').addEventListener('click', function() {
  var player = state.players[state.currentPlayerIndex];
  var maxWager = player.coins - DEBT_FLOOR;
  if (wager + WAGER_STEP <= maxWager) {
    wager += WAGER_STEP;
    renderBettingPanel();
  }
});

document.getElementById('btn-bet').addEventListener('click', doPlaceBet);
document.getElementById('btn-share').addEventListener('click', doBuyShare);
document.getElementById('btn-drug').addEventListener('click', doDrugSnail);
document.getElementById('btn-skip').addEventListener('click', doSkipAndRoll);

</script>
